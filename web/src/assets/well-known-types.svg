<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="wkt-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f3ff" />
      <stop offset="55%" stop-color="#00ff9f" />
      <stop offset="100%" stop-color="#ff66ff" />
    </linearGradient>
    <filter id="wkt-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <pattern id="wkt-grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#00f3ff" stroke-width="1" opacity="0.12" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#050505" />
  <rect width="1200" height="630" fill="url(#wkt-grid)" />
  <circle cx="602" cy="320" r="320" fill="#00f3ff" opacity="0.035" filter="url(#wkt-glow)" />

  <text x="72" y="34" fill="#00f3ff" font-size="14" font-weight="800" letter-spacing="2">PROTOBUF SIMPLIFIED</text>
  <text x="72" y="82" fill="#e2e8f0" font-size="46" font-weight="800">Well-known types</text>
  <text x="74" y="120" fill="#94a3b8" font-size="22">They are standard messages built from protobuf primitive types.</text>

  <g transform="translate(70 178)">
    <rect width="560" height="330" rx="10" fill="#0d0d12" stroke="#00f3ff" stroke-width="2" />
    <text x="28" y="44" fill="#94a3b8" font-size="14" font-weight="800" letter-spacing="3">SCHEMA</text>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">
      <text x="28" y="84">
        <tspan fill="#ff66ff">import</tspan>
        <tspan fill="#00ff9f"> "google/protobuf/timestamp.proto"</tspan>
        <tspan fill="#e2e8f0">;</tspan>
      </text>
      <text x="28" y="120">
        <tspan fill="#ff66ff">import</tspan>
        <tspan fill="#00ff9f"> "google/protobuf/field_mask.proto"</tspan>
        <tspan fill="#e2e8f0">;</tspan>
      </text>
      <text x="28" y="168"><tspan fill="#ff66ff">message</tspan><tspan fill="#e2e8f0"> UpdateUser {</tspan></text>
      <text x="48" y="208">
        <tspan fill="#00f3ff">google.protobuf.Timestamp</tspan>
        <tspan fill="#e2e8f0"> updated_at = </tspan>
        <tspan fill="#facc15">1</tspan>
        <tspan fill="#e2e8f0">;</tspan>
      </text>
      <text x="48" y="254">
        <tspan fill="#00f3ff">google.protobuf.FieldMask</tspan>
        <tspan fill="#e2e8f0"> update_mask = </tspan>
        <tspan fill="#facc15">2</tspan>
        <tspan fill="#e2e8f0">;</tspan>
      </text>
      <text x="28" y="300" fill="#e2e8f0">}</text>
    </g>
  </g>

  <g transform="translate(670 178)">
    <rect width="460" height="330" rx="10" fill="#0d0d12" stroke="url(#wkt-gradient)" stroke-width="3" filter="url(#wkt-glow)" />
    <text x="28" y="44" fill="#94a3b8" font-size="14" font-weight="800" letter-spacing="3">BUILT ON PRIMITIVES</text>
    <g font-size="20" font-weight="800">
      <rect x="30" y="72" width="185" height="76" rx="10" fill="#00f3ff" fill-opacity="0.13" stroke="#00f3ff" stroke-opacity="0.45" />
      <text x="56" y="104" fill="#00f3ff">Timestamp</text>
      <text x="56" y="132" fill="#94a3b8" font-size="15" font-weight="700">seconds + nanos</text>
      <rect x="245" y="72" width="185" height="76" rx="10" fill="#00ff9f" fill-opacity="0.13" stroke="#00ff9f" stroke-opacity="0.45" />
      <text x="271" y="104" fill="#00ff9f">Duration</text>
      <text x="271" y="132" fill="#94a3b8" font-size="15" font-weight="700">seconds + nanos</text>
      <rect x="30" y="178" width="185" height="76" rx="10" fill="#ff66ff" fill-opacity="0.13" stroke="#ff66ff" stroke-opacity="0.45" />
      <text x="56" y="210" fill="#ff66ff">FieldMask</text>
      <text x="56" y="238" fill="#94a3b8" font-size="15" font-weight="700">repeated string</text>
      <rect x="245" y="178" width="185" height="76" rx="10" fill="#facc15" fill-opacity="0.13" stroke="#facc15" stroke-opacity="0.45" />
      <text x="271" y="210" fill="#facc15">Any</text>
      <text x="271" y="238" fill="#94a3b8" font-size="15" font-weight="700">string + bytes</text>
    </g>
  </g>

  <g transform="translate(242 544)">
    <rect width="716" height="50" rx="25" fill="#ff66ff" fill-opacity="0.12" stroke="#ff66ff" stroke-opacity="0.55" />
    <text x="358" y="33" fill="#e2e8f0" font-size="21" font-weight="800" text-anchor="middle">Well-known types package common primitive fields as messages</text>
  </g>
</svg>
