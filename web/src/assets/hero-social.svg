<svg
  viewBox="0 0 1200 630"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="cyber-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f3ff" />
      <stop offset="100%" stop-color="#ff66ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#050505" />

  <!-- Grid -->
  <g opacity="0.1">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f3ff" stroke-width="1" />
    </pattern>
    <rect width="100%" height="100%" fill="url(#grid)" />
  </g>

  <!-- Central Glow -->
  <circle cx="600" cy="315" r="300" fill="#00f3ff" opacity="0.03" filter="url(#glow)" />

  <!-- Text -->
  <g font-family="Orbitron, sans-serif" font-weight="900" text-anchor="middle">
    <text
      x="600"
      y="280"
      fill="#e2e8f0"
      font-size="120"
      letter-spacing="-3"
    >
      PROTOBUF
    </text>
    <text
      x="600"
      y="420"
      fill="url(#cyber-gradient)"
      font-size="120"
      letter-spacing="0"
    >
      VISUALIZED
    </text>
  </g>

  <!-- Decorative elements -->
  <rect x="100" y="100" width="10" height="10" fill="#00f3ff" />
  <rect x="1090" y="520" width="10" height="10" fill="#ff66ff" />
</svg>
