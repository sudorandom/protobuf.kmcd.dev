<svg
  viewBox="0 0 1080 1920"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Inter:wght@400;700;800&amp;display=swap');
      
      .text-mono {
        font-family: 'JetBrains Mono', monospace;
      }
      
      .text-sans {
        font-family: 'Inter', sans-serif;
      }

      @keyframes dash-flow {
        to {
          stroke-dashoffset: -24;
        }
      }

      .flow-cyan {
        stroke-dasharray: 8, 8;
        animation: dash-flow 1.5s linear infinite;
      }

      .flow-green {
        stroke-dasharray: 8, 8;
        animation: dash-flow 1.5s linear infinite;
      }

      .flow-pink {
        stroke-dasharray: 8, 8;
        animation: dash-flow 1.5s linear infinite;
      }

      @keyframes glow-pulse {
        0%, 100% {
          filter: drop-shadow(0 0 4px rgba(0, 243, 255, 0.4));
        }
        50% {
          filter: drop-shadow(0 0 12px rgba(0, 243, 255, 0.7));
        }
      }

      .glow-box-cyan {
        animation: glow-pulse 3s ease-in-out infinite;
      }

      @keyframes text-pulse {
        0%, 100% { opacity: 0.9; }
        50% { opacity: 1; fill: #00f3ff; }
      }

      .pulse-cyan-text {
        animation: text-pulse 2s ease-in-out infinite;
      }
    </style>
    
    <linearGradient id="cyber-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f3ff" />
      <stop offset="100%" stop-color="#ff00ff" />
    </linearGradient>

    <marker
      id="arrowhead-cyan"
      markerWidth="10"
      markerHeight="7"
      refX="9"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#00f3ff" />
    </marker>

    <marker
      id="arrowhead-green"
      markerWidth="10"
      markerHeight="7"
      refX="9"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#00ff9f" />
    </marker>

    <marker
      id="arrowhead-pink"
      markerWidth="10"
      markerHeight="7"
      refX="9"
      refY="3.5"
      orient="auto"
    >
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff00ff" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#050505" />

  <!-- Grid -->
  <g opacity="0.05">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f3ff" stroke-width="1" />
    </pattern>
    <rect width="100%" height="100%" fill="url(#grid)" />
  </g>

  <!-- HEADER -->
  <g transform="translate(140, 150)">
    <text x="0" y="0" fill="#00f3ff" font-size="16" font-weight="800" letter-spacing="3" class="text-sans" uppercase="true">
      PROTOBUF SIMPLIFIED
    </text>
    <text x="0" y="50" fill="#e2e8f0" font-size="48" font-weight="800" class="text-sans">
      How Protobuf
    </text>
    <text x="0" y="110" fill="#e2e8f0" font-size="48" font-weight="800" class="text-sans">
      Encoding Works
    </text>
    <text x="0" y="165" fill="#94a3b8" font-size="22" class="text-sans">
      Protobuf turns structured data into compact bytes.
    </text>
  </g>

  <!-- SCHEMA BOX -->
  <g transform="translate(140, 420)">
    <rect
      x="0"
      y="0"
      width="800"
      height="220"
      rx="12"
      fill="#0d0d12"
      stroke="#00f3ff"
      stroke-width="1.5"
      class="glow-box-cyan"
    />
    <text x="40" y="-15" fill="#94a3b8" font-size="16" letter-spacing="2" font-weight="bold" class="text-sans">
      SCHEMA DEFINITION (.proto)
    </text>
    
    <!-- Code Snippet -->
    <g class="text-mono" font-size="24" font-weight="bold">
      <text x="50" y="65" fill="#ff00ff">message</text>
      <text x="170" y="65" fill="#e2e8f0">User {</text>
      <text x="90" y="125" fill="#00f3ff">string</text>
      <text x="190" y="125" fill="#e2e8f0">name =</text>
      <text x="290" y="125" fill="#facc15">1</text>
      <text x="310" y="125" fill="#e2e8f0">;</text>
      <text x="50" y="175" fill="#e2e8f0">}</text>
    </g>
  </g>

  <!-- DATA BOX -->
  <g transform="translate(140, 740)">
    <rect
      x="0"
      y="0"
      width="800"
      height="220"
      rx="12"
      fill="#0d0d12"
      stroke="#00ff9f"
      stroke-width="1.5"
      opacity="0.9"
    />
    <text x="40" y="-15" fill="#94a3b8" font-size="16" letter-spacing="2" font-weight="bold" class="text-sans">
      APPLICATION DATA (JSON-like)
    </text>
    
    <!-- Data Snippet -->
    <g class="text-mono" font-size="24" font-weight="bold">
      <text x="50" y="85" fill="#e2e8f0">{</text>
      <text x="90" y="130" fill="#00f3ff">name</text>
      <text x="150" y="130" fill="#e2e8f0">:</text>
      <text x="180" y="130" fill="#00ff9f">"Alice"</text>
      <text x="50" y="175" fill="#e2e8f0">}</text>
    </g>
  </g>

  <!-- CONNECTING FLOW LINES (Schema & Data -> Combiner) -->
  <!-- Line from Schema -->
  <path
    d="M 540 640 L 540 700"
    fill="none"
    stroke="#00f3ff"
    stroke-width="3.5"
    class="flow-cyan"
    marker-end="url(#arrowhead-cyan)"
  />
  
  <!-- Line from Data -->
  <path
    d="M 540 960 L 540 1020"
    fill="none"
    stroke="#00ff9f"
    stroke-width="3.5"
    class="flow-green"
    marker-end="url(#arrowhead-green)"
  />

  <!-- COMBINER (+) NODE -->
  <g transform="translate(540, 1050)">
    <circle
      cx="0"
      cy="0"
      r="28"
      fill="#0d0d12"
      stroke="#ff00ff"
      stroke-width="2.5"
      style="filter: drop-shadow(0 0 10px rgba(255,0,255,0.5));"
    />
    <text
      x="0"
      y="8"
      fill="#ff00ff"
      font-size="32"
      text-anchor="middle"
      font-weight="bold"
      class="text-sans"
    >
      +
    </text>
  </g>

  <!-- FLOW LINE (Combiner -> Payload) -->
  <path
    d="M 540 1078 L 540 1140"
    fill="none"
    stroke="#ff00ff"
    stroke-width="3.5"
    class="flow-pink"
    marker-end="url(#arrowhead-pink)"
  />

  <!-- ENCODED PAYLOAD BOX -->
  <g transform="translate(140, 1180)">
    <rect
      x="0"
      y="0"
      width="800"
      height="460"
      rx="12"
      fill="#0d0d12"
      stroke="url(#cyber-gradient)"
      stroke-width="2.5"
      style="filter: drop-shadow(0 0 12px rgba(0, 243, 255, 0.3));"
    />
    <text x="40" y="-15" fill="#94a3b8" font-size="16" letter-spacing="2" font-weight="bold" class="text-sans">
      ENCODED BINARY PAYLOAD
    </text>

    <!-- HEX representation -->
    <g transform="translate(60, 80)">
      <text x="0" y="-20" fill="#94a3b8" font-size="14" font-weight="bold" class="text-sans">HEXADECIMAL BYTES</text>
      
      <!-- Tag -->
      <rect x="0" y="0" width="180" height="60" rx="6" fill="#00f3ff" fill-opacity="0.15" stroke="#00f3ff" stroke-width="1" />
      <text x="90" y="38" fill="#00f3ff" font-size="28" font-weight="bold" text-anchor="middle" class="text-mono">0a</text>
      <text x="90" y="85" fill="#94a3b8" font-size="16" text-anchor="middle" class="text-sans">Tag (field 1, varint)</text>
      
      <!-- Length -->
      <rect x="230" y="0" width="180" height="60" rx="6" fill="#facc15" fill-opacity="0.15" stroke="#facc15" stroke-width="1" />
      <text x="320" y="38" fill="#facc15" font-size="28" font-weight="bold" text-anchor="middle" class="text-mono">05</text>
      <text x="320" y="85" fill="#94a3b8" font-size="16" text-anchor="middle" class="text-sans">Length (5 bytes)</text>

      <!-- Value -->
      <rect x="460" y="0" width="220" height="60" rx="6" fill="#00ff9f" fill-opacity="0.15" stroke="#00ff9f" stroke-width="1" />
      <text x="570" y="38" fill="#00ff9f" font-size="26" font-weight="bold" text-anchor="middle" class="text-mono" letter-spacing="1">41 6c 69 63 65</text>
      <text x="570" y="85" fill="#94a3b8" font-size="16" text-anchor="middle" class="text-sans">UTF-8 "Alice"</text>
    </g>

    <!-- BINARY representation -->
    <g transform="translate(60, 240)" class="text-mono">
      <text x="0" y="-15" fill="#94a3b8" font-size="14" font-weight="bold" class="text-sans">BINARY REPRESENTATION</text>
      
      <line x1="0" y1="0" x2="680" y2="0" stroke="#2d3748" stroke-width="1" />
      
      <!-- Tag binary -->
      <text x="90" y="45" font-size="20" text-anchor="middle">
        <tspan fill="#00f3ff">00001</tspan>
        <tspan fill="#ff00ff">010</tspan>
      </text>
      <text x="90" y="75" fill="#94a3b8" font-size="14" text-anchor="middle" class="text-sans">
        <tspan fill="#00f3ff">field 1</tspan> | <tspan fill="#ff00ff">wire 2</tspan>
      </text>

      <!-- Length binary -->
      <text x="320" y="45" fill="#facc15" font-size="20" text-anchor="middle">00000101</text>
      <text x="320" y="75" fill="#94a3b8" font-size="14" text-anchor="middle" class="text-sans">length = 5</text>

      <!-- Value binary -->
      <text x="570" y="30" fill="#00ff9f" font-size="16" text-anchor="middle" letter-spacing="0.5">01000001 01101100</text>
      <text x="570" y="60" fill="#00ff9f" font-size="16" text-anchor="middle" letter-spacing="0.5">01101001 01100011 01100101</text>
      <text x="570" y="88" fill="#94a3b8" font-size="14" text-anchor="middle" class="text-sans">characters of "Alice"</text>
    </g>

    <!-- Size Comparison footer -->
    <rect x="60" y="375" width="680" height="50" rx="6" fill="#1a1a24" opacity="0.8" />
    <text x="80" y="405" fill="#e2e8f0" font-size="16" font-weight="bold" class="text-sans">
      Total payload: 7 bytes <tspan fill="#94a3b8" font-weight="normal">(vs 16 bytes for equivalent JSON)</tspan>
    </text>
  </g>

  <!-- BRANDING FOOTER -->
  <g transform="translate(540, 1780)">
    <text x="0" y="0" fill="#94a3b8" font-size="18" font-weight="bold" text-anchor="middle" class="text-mono" opacity="0.6">
      protobuf<tspan fill="#00f3ff">.kmcd.dev</tspan>
    </text>
  </g>
</svg>
