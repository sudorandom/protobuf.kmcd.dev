name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          install: true
      - name: Install dependencies
        run: just web-install
      - name: Cache WASM parser
        id: cache-wasm
        uses: actions/cache@v4
        with:
          path: web/public/parser.wasm
          key: ${{ runner.os }}-wasm-${{ github.ref_name }}-${{ hashFiles('wasm-parser/**') }}
          restore-keys: |
            ${{ runner.os }}-wasm-${{ github.ref_name }}-
      - name: Touch WASM if cache hit
        if: steps.cache-wasm.outputs.cache-hit == 'true'
        run: touch web/public/parser.wasm
      - name: Build
        run: just web-build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web/dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
