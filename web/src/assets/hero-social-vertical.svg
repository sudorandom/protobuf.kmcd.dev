<svg
  viewBox="0 0 1080 1920"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&amp;family=Inter:wght@400;700&amp;display=swap');
      
      .title-text {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        text-anchor: middle;
      }
      
      .sub-text {
        font-family: 'Inter', sans-serif;
        text-anchor: middle;
      }

      @keyframes pulse-glow {
        0%, 100% {
          filter: drop-shadow(0 0 15px rgba(0, 243, 255, 0.6));
        }
        50% {
          filter: drop-shadow(0 0 30px rgba(255, 102, 255, 0.8));
        }
      }

      .animated-glow {
        animation: pulse-glow 4s ease-in-out infinite;
      }
    </style>
    <linearGradient id="cyber-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" />
      <stop offset="50%" stop-color="#ff66ff" />
      <stop offset="100%" stop-color="#00ff9f" />
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f3ff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#050505" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#050505" />

  <!-- Central Glow -->
  <circle cx="540" cy="960" r="600" fill="url(#center-glow)" />

  <!-- Grid -->
  <g opacity="0.08">
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00f3ff" stroke-width="1" />
    </pattern>
    <rect width="100%" height="100%" fill="url(#grid)" />
  </g>

  <!-- Animated Decorative Background Circles -->
  <circle cx="540" cy="960" r="380" fill="none" stroke="#ff66ff" stroke-width="1" opacity="0.2" stroke-dasharray="10, 20" />
  <circle cx="540" cy="960" r="400" fill="none" stroke="#00f3ff" stroke-width="1.5" opacity="0.3" stroke-dasharray="20, 15" />

  <!-- Title & Branding -->
  <g class="animated-glow">
    <text
      x="540"
      y="840"
      fill="#e2e8f0"
      font-size="110"
      letter-spacing="-3"
      class="title-text"
    >
      PROTOBUF
    </text>
    <text
      x="540"
      y="980"
      fill="url(#cyber-gradient)"
      font-size="110"
      letter-spacing="1"
      class="title-text"
    >
      VISUALIZED
    </text>
  </g>

  <!-- Subtitle -->
  <text
    x="540"
    y="1100"
    fill="#94a3b8"
    font-size="28"
    font-weight="bold"
    letter-spacing="8"
    class="sub-text"
    text-transform="uppercase"
  >
    Interactive Guide
  </text>

  <!-- Decorative elements -->
  <rect x="180" y="450" width="15" height="15" fill="#00f3ff" opacity="0.7" />
  <rect x="885" y="1450" width="15" height="15" fill="#ff66ff" opacity="0.7" />
  
  <line x1="540" y1="1200" x2="540" y2="1350" stroke="#00f3ff" stroke-width="2" stroke-dasharray="5,5" opacity="0.5" />
  <circle cx="540" cy="1350" r="6" fill="#00f3ff" />
</svg>
