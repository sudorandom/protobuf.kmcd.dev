<svg
  viewBox="0 0 800 540"
  xmlns="http://www.w3.org/2000/svg"
  font-family="monospace"
>
  <rect width="100%" height="100%" fill="#050505" />
  <defs>
    <linearGradient id="cyber-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f3ff" />
      <stop offset="100%" stop-color="#ff00ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <marker
      id="arrowhead"
      markerWidth="10"
      markerHeight="7"
      refX="9"
      refY="3.5"
      orient="auto"
    >
      <polygon
        points="0 0, 10 3.5, 0 7"
        fill="#00f3ff"
        opacity="0.8"
      />
    </marker>
    <marker
      id="arrowhead-pink"
      markerWidth="10"
      markerHeight="7"
      refX="9"
      refY="3.5"
      orient="auto"
    >
      <polygon
        points="0 0, 10 3.5, 0 7"
        fill="#ff00ff"
        opacity="0.8"
      />
    </marker>
  </defs>

  <text x="60" y="32" fill="#00f3ff" font-size="11" font-weight="800" letter-spacing="1.5" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    PROTOBUF SIMPLIFIED
  </text>
  <text x="60" y="68" fill="#e2e8f0" font-size="34" font-weight="800" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    How protobuf encoding works
  </text>
  <text x="62" y="98" fill="#94a3b8" font-size="16" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    Protobuf uses your schema to turn structured data into compact bytes.
  </text>

  <g transform="translate(0 106)">
  <!-- Schema Box -->
  <g>
    <rect
      x="90"
      y="50"
      width="280"
      height="120"
      rx="8"
      fill="#0d0d12"
      stroke="#00f3ff"
      stroke-width="1"
      opacity="0.9"
    />
    <text
      x="105"
      y="80"
      fill="#ff00ff"
      font-size="14"
      font-weight="bold"
    >
      message
    </text>
    <text x="180" y="80" fill="#e2e8f0" font-size="14">
      User {
    </text>
    <text x="120" y="110" fill="#00f3ff" font-size="14">
      string
    </text>
    <text x="175" y="110" fill="#e2e8f0" font-size="14">
      name =
    </text>
    <text x="235" y="110" fill="#facc15" font-size="14">
      1
    </text>
    <text x="245" y="110" fill="#e2e8f0" font-size="14">
      ;
    </text>
    <text x="105" y="140" fill="#e2e8f0" font-size="14">
      }
    </text>
    <text
      x="105"
      y="40"
      fill="#94a3b8"
      font-size="12"
      letter-spacing="2"
      font-weight="bold"
      text-transform="uppercase"
    >
      SCHEMA
    </text>
  </g>

  <!-- Data Box -->
  <g>
    <rect
      x="430"
      y="50"
      width="280"
      height="120"
      rx="8"
      fill="#0d0d12"
      stroke="#00ff9f"
      stroke-width="1"
      opacity="0.9"
    />
    <text x="445" y="95" fill="#00f3ff" font-size="14">
      name
    </text>
    <text x="485" y="95" fill="#e2e8f0" font-size="14">
      :
    </text>
    <text x="500" y="95" fill="#00ff9f" font-size="14">
      "Alice"
    </text>
    <text
      x="445"
      y="40"
      fill="#94a3b8"
      font-size="12"
      letter-spacing="2"
      font-weight="bold"
      text-transform="uppercase"
    >
      DATA
    </text>
  </g>

  <!-- Connecting Lines -->
  <g>
    <!-- From Schema -->
    <path
      d="M 230 170 L 230 210 L 360 210 L 360 240"
      fill="none"
      stroke="#00f3ff"
      stroke-width="2"
      stroke-dasharray="5,5"
      marker-end="url(#arrowhead)"
      opacity="0.6"
    />
    <!-- From JSON -->
    <path
      d="M 570 170 L 570 210 L 440 210 L 440 240"
      fill="none"
      stroke="#00ff9f"
      stroke-width="2"
      stroke-dasharray="5,5"
      marker-end="url(#arrowhead)"
      opacity="0.6"
    />

    <!-- Central combining node -->
    <circle
      cx="400"
      cy="210"
      r="16"
      fill="#0d0d12"
      stroke="#ff00ff"
      stroke-width="2"
      filter="url(#glow)"
    />
    <text
      x="400"
      y="215"
      fill="#ff00ff"
      font-size="18"
      text-anchor="middle"
      font-weight="bold"
    >
      +
    </text>
  </g>

  <!-- Third Phase Connecting Line -->
  <g>
    <path
      d="M 400 325 L 400 360"
      fill="none"
      stroke="#ff00ff"
      stroke-width="2"
      stroke-dasharray="5,5"
      marker-end="url(#arrowhead-pink)"
      opacity="0.6"
    />
  </g>

  <!-- Encoded Output Box -->
  <g>
    <rect
      x="150"
      y="250"
      width="500"
      height="150"
      rx="8"
      fill="#0d0d12"
      stroke="url(#cyber-gradient)"
      stroke-width="2"
      filter="url(#glow)"
      opacity="0.9"
    />
    <text
      x="170"
      y="240"
      fill="#94a3b8"
      font-size="12"
      letter-spacing="2"
      font-weight="bold"
      text-transform="uppercase"
    >
      ENCODED PAYLOAD
    </text>

    <g transform="translate(190, 290)">
      <!-- Hex Layer -->
      <rect
        x="0"
        y="-20"
        width="100"
        height="30"
        rx="4"
        fill="#00f3ff"
        fill-opacity="0.2"
      />
      <text
        x="50"
        y="0"
        fill="#00f3ff"
        font-size="18"
        text-anchor="middle"
        font-weight="bold"
      >
        0a
      </text>
      <text
        x="50"
        y="25"
        fill="#94a3b8"
        font-size="12"
        text-anchor="middle"
      >
        Tag
      </text>

      <rect
        x="110"
        y="-20"
        width="100"
        height="30"
        rx="4"
        fill="#facc15"
        fill-opacity="0.2"
      />
      <text
        x="160"
        y="0"
        fill="#facc15"
        font-size="18"
        text-anchor="middle"
        font-weight="bold"
      >
        05
      </text>
      <text
        x="160"
        y="25"
        fill="#94a3b8"
        font-size="12"
        text-anchor="middle"
      >
        Len
      </text>

      <rect
        x="220"
        y="-20"
        width="200"
        height="30"
        rx="4"
        fill="#00ff9f"
        fill-opacity="0.2"
      />
      <text
        x="320"
        y="0"
        fill="#00ff9f"
        font-size="18"
        text-anchor="middle"
        font-weight="bold"
        letter-spacing="2"
      >
        41 6c 69 63 65
      </text>
      <text
        x="320"
        y="25"
        fill="#94a3b8"
        font-size="12"
        text-anchor="middle"
      >
        "Alice"
      </text>
    </g>

    <g transform="translate(190, 355)">
      <!-- Binary Layer -->
      <text
        x="50"
        y="0"
        font-size="12"
        text-anchor="middle"
      >
        <tspan fill="#00f3ff">00001</tspan>
        <tspan fill="#ff00ff">010</tspan>
      </text>
      <text
        x="160"
        y="0"
        fill="#facc15"
        font-size="12"
        text-anchor="middle"
      >
        00000101
      </text>

      <text
        x="320"
        y="-8"
        fill="#00ff9f"
        font-size="12"
        text-anchor="middle"
        letter-spacing="1"
      >
        01000001 01101100
      </text>
      <text
        x="320"
        y="8"
        fill="#00ff9f"
        font-size="12"
        text-anchor="middle"
        letter-spacing="1"
      >
        01101001 01100011 01100101
      </text>

      <text
        x="25"
        y="24"
        fill="#94a3b8"
        font-size="12"
        text-anchor="middle"
      >
        Field
      </text>
      <text
        x="75"
        y="24"
        fill="#94a3b8"
        font-size="12"
        text-anchor="middle"
      >
        Type
      </text>
      <text
        x="160"
        y="24"
        fill="#94a3b8"
        font-size="12"
        text-anchor="middle"
      >
        Len
      </text>
      <text
        x="320"
        y="24"
        fill="#94a3b8"
        font-size="12"
        text-anchor="middle"
      >
        "Alice"
      </text>
    </g>
  </g>
  </g>
</svg>
