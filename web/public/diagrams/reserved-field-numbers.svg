<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="reserved-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f3ff" />
      <stop offset="100%" stop-color="#ff66ff" />
    </linearGradient>
    <filter id="reserved-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <pattern id="reserved-grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#00f3ff" stroke-width="1" opacity="0.12" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#050505" />
  <rect width="1200" height="630" fill="url(#reserved-grid)" />
  <circle cx="585" cy="324" r="315" fill="#00f3ff" opacity="0.035" filter="url(#reserved-glow)" />

  <text x="72" y="82" fill="#e2e8f0" font-size="46" font-weight="800">Reserve field numbers</text>
  <text x="74" y="120" fill="#94a3b8" font-size="22">When a field is removed, keep its number blocked forever.</text>

  <g transform="translate(70 185)">
    <rect width="510" height="300" rx="10" fill="#0d0d12" stroke="#00f3ff" stroke-width="2" />
    <text x="28" y="44" fill="#94a3b8" font-size="14" font-weight="800" letter-spacing="3">BEFORE</text>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">
      <text x="28" y="92" fill="#ff66ff">message</text>
      <text x="140" y="92" fill="#e2e8f0">User {</text>
      <text x="48" y="138" fill="#00f3ff">string</text>
      <text x="140" y="138" fill="#e2e8f0">name =</text>
      <text x="226" y="138" fill="#facc15">1</text>
      <text x="240" y="138" fill="#e2e8f0">;</text>
      <text x="48" y="184" fill="#00f3ff">string</text>
      <text x="140" y="184" fill="#e2e8f0">legacy_id =</text>
      <text x="292" y="184" fill="#facc15">2</text>
      <text x="306" y="184" fill="#e2e8f0">;</text>
      <text x="48" y="230" fill="#00f3ff">string</text>
      <text x="140" y="230" fill="#e2e8f0">email =</text>
      <text x="226" y="230" fill="#facc15">3</text>
      <text x="240" y="230" fill="#e2e8f0">;</text>
      <text x="28" y="276" fill="#e2e8f0">}</text>
    </g>
  </g>

  <g transform="translate(620 185)">
    <rect width="510" height="300" rx="10" fill="#0d0d12" stroke="url(#reserved-gradient)" stroke-width="3" filter="url(#reserved-glow)" />
    <text x="28" y="44" fill="#94a3b8" font-size="14" font-weight="800" letter-spacing="3">AFTER</text>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">
      <text x="28" y="92" fill="#ff66ff">message</text>
      <text x="140" y="92" fill="#e2e8f0">User {</text>
      <text x="48" y="138" fill="#00f3ff">string</text>
      <text x="140" y="138" fill="#e2e8f0">name =</text>
      <text x="226" y="138" fill="#facc15">1</text>
      <text x="240" y="138" fill="#e2e8f0">;</text>
      <text x="48" y="184" fill="#ff66ff">reserved</text>
      <text x="174" y="184" fill="#facc15">2</text>
      <text x="188" y="184" fill="#e2e8f0">;</text>
      <text x="48" y="230" fill="#00f3ff">string</text>
      <text x="140" y="230" fill="#e2e8f0">email =</text>
      <text x="226" y="230" fill="#facc15">3</text>
      <text x="240" y="230" fill="#e2e8f0">;</text>
      <text x="28" y="276" fill="#e2e8f0">}</text>
    </g>
  </g>

  <g transform="translate(353 515)">
    <rect width="494" height="50" rx="25" fill="#ff66ff" fill-opacity="0.12" stroke="#ff66ff" stroke-opacity="0.55" />
    <text x="247" y="33" fill="#e2e8f0" font-size="21" font-weight="800" text-anchor="middle">Never reuse 2 for a new meaning</text>
  </g>
</svg>
