<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="deprecated-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f3ff" />
      <stop offset="100%" stop-color="#ff66ff" />
    </linearGradient>
    <filter id="deprecated-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <pattern id="deprecated-grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#00f3ff" stroke-width="1" opacity="0.12" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#050505" />
  <rect width="1200" height="630" fill="url(#deprecated-grid)" />
  <circle cx="585" cy="324" r="315" fill="#ff66ff" opacity="0.035" filter="url(#deprecated-glow)" />

  <text x="72" y="82" fill="#e2e8f0" font-size="46" font-weight="800">Deprecate before removing</text>
  <text x="74" y="120" fill="#94a3b8" font-size="22">Mark a field as deprecated while clients migrate to its replacement.</text>
  <text x="72" y="34" fill="#00f3ff" font-size="14" font-weight="800" letter-spacing="2">PROTOBUF SIMPLIFIED</text>

  <g transform="translate(90 188)">
    <rect width="455" height="286" rx="10" fill="#0d0d12" stroke="#00f3ff" stroke-width="2" />
    <text x="28" y="44" fill="#94a3b8" font-size="14" font-weight="800" letter-spacing="3">SCHEMA</text>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">
      <text x="28" y="92" fill="#ff66ff">message</text>
      <text x="140" y="92" fill="#e2e8f0">User {</text>
      <text x="48" y="142">
        <tspan fill="#00f3ff">string</tspan>
        <tspan fill="#e2e8f0"> username = </tspan>
        <tspan fill="#facc15">1</tspan>
        <tspan fill="#e2e8f0"> [</tspan>
      </text>
      <text x="76" y="182" fill="#94a3b8">deprecated = true</text>
      <text x="48" y="222" fill="#e2e8f0">];</text>
      <text x="28" y="262" fill="#e2e8f0">}</text>
    </g>
  </g>

  <g transform="translate(595 188)">
    <rect width="515" height="286" rx="10" fill="#0d0d12" stroke="url(#deprecated-gradient)" stroke-width="3" filter="url(#deprecated-glow)" />
    <text x="28" y="44" fill="#94a3b8" font-size="14" font-weight="800" letter-spacing="3">GENERATED CODE SIGNAL</text>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">
      <rect x="30" y="74" width="455" height="56" rx="8" fill="#ff66ff" fill-opacity="0.12" stroke="#ff66ff" stroke-opacity="0.45" />
      <text x="52" y="110" fill="#ff66ff">@Deprecated</text>
      <text x="188" y="110" fill="#e2e8f0">getUsername()</text>
      <rect x="30" y="152" width="455" height="56" rx="8" fill="#00f3ff" fill-opacity="0.12" stroke="#00f3ff" stroke-opacity="0.45" />
      <text x="52" y="188" fill="#00f3ff">warning</text>
      <text x="152" y="188" fill="#e2e8f0">prefer display_name</text>
      <text x="52" y="238" fill="#94a3b8" font-size="17">Wire data still decodes.</text>
      <text x="52" y="264" fill="#94a3b8" font-size="17">New code gets migration hints.</text>
    </g>
  </g>

  <g transform="translate(190 527)">
    <rect width="820" height="50" rx="25" fill="#ff66ff" fill-opacity="0.12" stroke="#ff66ff" stroke-opacity="0.55" />
    <text x="410" y="33" fill="#e2e8f0" font-size="21" font-weight="800" text-anchor="middle">Deprecation tells developers and tooling that a field is going away</text>
  </g>
</svg>
